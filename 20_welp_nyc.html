<!-- Welp! Public Bathrooms 🧻 -->
<!-- Codédex -->

<!DOCTYPE html>
<html>
  <head>
    <title>Welp! 🧻</title>
  </head>
  <body>
    <form>
      <h1>Welp! 🧻</h2>    
      <h4><i>Find a NYC public bathroom near you.</i></h4>

      <label for="bathroom">Which bathroom are you reviewing?</label>
      <input type="text" id="bathroom" required>
      <br><br>

      Cleanliness (out of 5):<br><br>
      <input type="radio" id="cleanliness-1" name="cleanliness">
      <label for="cleanliness-1">1 🧻</label><br>
      <input type="radio" id="cleanliness-2" name="cleanliness">
      <label for="cleanliness-2">2 🧻🧻</label><br>
      <input type="radio" id="cleanliness-3" name="cleanliness">
      <label for="cleanliness-3">3 🧻🧻🧻</label><br>
      <input type="radio" id="cleanliness-4" name="cleanliness">
      <label for="cleanliness-4">4 🧻🧻🧻🧻</label><br>
      <input type="radio" id="cleanliness-5" name="cleanliness">
      <label for="cleanliness-5">5 🧻🧻🧻🧻🧻</label><br><br>

      Comfort (out of 5):<br><br>
      <input type="radio" id="comfort-1" name="comfort">
      <label for="comfort-1">1 💩</label><br>
      <input type="radio" id="comfort-2" name="comfort">
      <label for="comfort-2">2 💩💩</label><br>
      <input type="radio" id="comfort-3" name="comfort">
      <label for="comfort-3">3 💩💩💩</label><br>
      <input type="radio" id="comfort-4" name="comfort">
      <label for="comfort-4">4 💩💩💩💩</label><br>
      <input type="radio" id="comfort-5" name="comfort">
      <label for="comfort-5">5 💩💩💩💩💩</label><br><br>

      Vibes (out of 5):<br><br>
      <input type="radio" id="vibes-1" name="vibes">
      <label for="vibes-1">1 💅</label><br>
      <input type="radio" id="vibes-2" name="vibes">
      <label for="vibes-2">2 💅💅</label><br>
      <input type="radio" id="vibes-3" name="vibes">
      <label for="vibes-3">3 💅💅💅</label><br>
      <input type="radio" id="vibes-4" name="vibes">
      <label for="vibes-4">4 💅💅💅💅</label><br>
      <input type="radio" id="vibes-5" name="vibes">
      <label for="vibes-5">5 💅💅💅💅💅</label><br><br>
      <label for="review">My Review:</label><br><br>
      <textarea id="review" rows="6" cols="46" placeholder="Tell us about your experience..."></textarea>
      <br><br>

      Add Tags:<br><br>
      <input type="checkbox" id="spacious">
      <label for="spacious">🏡 Spacious</label>
      <input type="checkbox" id="ambience">
      <label for="ambience">🔮 Ambience</label>
      <input type="checkbox" id="selfie-mirror">
      <label for="selfie-mirror">🪞 Selfie Mirror</label><br>
      <input type="checkbox" id="accessible">
      <label for="accessible">♿ Accessible</label>
      <input type="checkbox" id="stanky">
      <label for="stanky">🤮 Stanky</label>
      <input type="checkbox" id="changing-table">
      <label for="changing-table">👶 Changing Table</label><br>
      <input type="checkbox" id="pin-code">
      <label for="pin-code">🔐 Pin Code</label>
      <input type="checkbox" id="grab-bar">
      <label for="grab-bar">✋ Grab Bar</label>
      <input type="checkbox" id="nyc-parks">
      <label for="nyc-parks">🍁 NYC Parks</label><br><br>

      <input type="submit" value="Post Review">
    </form>
  </body>
</html>
